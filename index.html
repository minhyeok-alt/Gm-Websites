<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GM-Web Site-공식 홈페이지</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 상단 */
.header {
    background-color: yellow;
    color: black;
    text-align: center;
    padding: 20px;
    font-family: fantasy;
}

/* 메뉴 */
.nav {
    background-color: #333;
}

.nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

.nav > ul > li {
    position: relative;
    padding: 15px 100px;
}

.nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
}

/* 드롭다운 */
.dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: black;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.nav li:hover .dropdown {
    opacity: 1;
    visibility: visible;
}

.dropdown li {
    text-align: center;
}

.dropdown a {
    display: block;
    padding: 10px;
}

.dropdown a:hover {
    background: #444;
}

/* 🔥 슬라이더 1장 전용 */
.slider {
    width: 100%;
    height: 500px;
    overflow: hidden;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.slider img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* 카드 */
.card-container {
    padding: 40px;
    text-align: center;
}

.card-title {
    background: yellow;
    padding: 15px;
    font-size: 24px;
    font-weight: bold;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
}

.card {
    width: 250px;
    background: #f5f5f5;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.card img {
    width: 100%;
}

.card-content {
    padding: 15px;
}

.card:hover {
    transform: translateY(-10px);
}

/* 글 */
.content-box {
    padding: 40px;
    text-align: center;
}

/* footer */
.footer {
    background: yellow;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<div class="header">
    <h1>GM-Web Site</h1>
    <p>회사소개 전문</p>
</div>

<nav class="nav">

                <li><a href="후기.html">후기</a></li>
            </ul>
        </li>
    </ul>
</nav>

<!-- 슬라이더: 사진 1장 전용 -->

<!-- 카드 -->
