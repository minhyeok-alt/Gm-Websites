<!DOCTYPE html>
<html lang="ko">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>GM-Web Site-공식 홈페이지</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 상단 */
.header {
    background-color: yellow;
    color: black;
    text-align: center;
    padding: 20px;
    font-family: fantasy;
}

/* 메뉴 */
.nav {
    background-color: #333;
    position: relative; /* 드롭다운 z-index 기준 */
    z-index: 10; /* 슬라이드보다 위에 표시 */
}

.nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

.nav > ul > li {
    position: relative;
    padding: 15px 100px;
    text-align: center;
}

.nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    display: block;
}

/* 드롭다운 */
.dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background-color: black;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.3s ease;
    z-index: 20; /* 슬라이드보다 위 */
}

.nav > ul > li:hover > .dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.dropdown a {
    padding: 12px 0;
}

.nav > ul > li:hover {
    background-color: black;
}

.dropdown a:hover {
    background-color: #444;
}

/* 🔥 슬라이드 */
.slider {
    width: 100%;
    overflow: hidden;
    height: 500px;
    position: relative;
    z-index: 1; /* 드롭다운 뒤로 보내기 */
}

.slides {
    display: flex;
    width: calc(100% * 5);
    height: 100%;
    animation: slide 20s infinite;
}

.slide {
    width: 100%;
    flex-shrink: 0;
    height: 100%;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
/* 🔥 카드 영역 */
.card-container {
    padding: 40px;
    text-align: center;
}

.card-title {
    background-color: yellow;
    color: black;
    font-size: 24px;
    font-weight: bold;
    padding: 15px;
    margin-bottom: 20px;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 30px;
}

.card {
    width: 250px;
    background: #f5f5f5;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.card img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
}

.card-content {
    padding: 15px;
    text-align: center;
}

.card:hover {
    transform: translateY(-10px);
    background: #ddd;
}

/* 글 영역 */
.content-box {
    padding: 40px;
    text-align: center;
}

/* footer */
.footer {
    background-color: yellow;
    color: black;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<!-- 상단 -->
<div class="header">
    <h1>GM-Web Site</h1>
    <p>회사소개 전문</p>
</div>

<!-- 메뉴 -->
<nav class="nav">
    <ul>
        <li>
            <a href="#">소개</a>
            <ul class="dropdown">
                <li><a href="소개.html">소개</a></li>
            </ul>
        </li>
        <li>
            <a href="#">실적</a>
            <ul class="dropdown">
                <li><a href="실적.html">실적</a></li>
            </ul>
        </li>
        <li>
            <a href="#">신청</a>
            <ul class="dropdown">
                <li><a href="메일.html">카톡</a></li>
                <li><a href="메일.html">이메일</a></li>
            </ul>
        </li>
    </ul>
</nav>

<!-- 🔥 슬라이드 -->
<div class="slider">
    <div class="slides">
        <div class="slide"><img src="img/logo.png" alt="슬라이드1"></div>
        <div class="slide"><img src="img/make.jpg" alt="슬라이드2"></div>
        <div class="slide"><img src="img/exam.jpg" alt="슬라이드3"></div>
        <div class="slide"><img src="img/make2.jpg" alt="슬라이드4"></div>
        <div class="slide"><img src="img/exam2.jpg" alt="슬라이드5"></div>
    </div>
</div>

    }
</style>
<!-- 🔥 카드 영역 -->

    <div class="cards">
        <div class="card">
            <img src="img/make.jpg" alt="첫 웹사이트">

</div>
