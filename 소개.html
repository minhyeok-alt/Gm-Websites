<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>GM-Web Site-공식 홈페이지</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 상단 */
.header {
    background-color: yellow;
    color: black;
    text-align: center;
    padding: 20px;
    font-family: fantasy;
}

/* 메뉴 */
.nav {
    background-color: #333;
    position: relative;
    z-index: 10;
}

.nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

.nav > ul > li {
    position: relative;
    padding: 15px 100px;
    text-align: center;
}

.nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    display: block;
}

/* 드롭다운 */
.dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background-color: black;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.3s ease;
    z-index: 20;
}

.nav > ul > li:hover > .dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

/* 🔥 세로 정렬 핵심 */
.dropdown li {
    display: block;
    text-align: center;
}

.dropdown a {
    padding: 12px 0;
}

.nav > ul > li:hover {
    background-color: black;
}

.dropdown a:hover {
    background-color: #444;
}

/* 슬라이드 */
.slider {
    width: 100%;
    overflow: hidden;
    height: 500px;
    position: relative;
    z-index: 1;
}

.slides {
    display: flex;
    width: calc(100% * 5);
    height: 100%;
}

.slide {
    width: 100%;
    flex-shrink: 0;
    height: 100%;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 카드 */
.card-container {
    padding: 40px;
    text-align: center;
}

.card-title {
    background-color: yellow;
    color: black;
    font-size: 24px;
    font-weight: bold;
    padding: 15px;
    margin-bottom: 20px;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 30px;
}

.card {
    width: 250px;
    background: #f5f5f5;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.card img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
}

.card-content {
    padding: 15px;
    text-align: center;
}

.card:hover {
    transform: translateY(-10px);
    background: #ddd;
}

/* 글 영역 */
.content-box {
    padding: 40px;
    text-align: center;
}

/* footer */
.footer {
    background-color: yellow;
    color: black;
    text-align: center;
    padding: 20px;
}
</style>
</head>
