<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GM-Web Site-공식 홈페이지/소개</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 상단 */
.header {
    background-color: yellow;
    color: black;
    text-align: center;
    padding: 20px;
}

/* 메뉴 */
.nav {
    background-color: #333;
}

.nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
}

/* 👉 메뉴 간격 */
.nav > ul > li {
    position: relative;
    padding: 15px 100px;
    text-align: center;
}

/* 글씨 */
.nav a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    display: block;
}

/* 👉 드롭다운 (폭 100%로 맞춤) */
.dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%; /* 🔥 핵심: 위 메뉴랑 크기 맞춤 */
    background-color: black;

    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.3s ease;
}

/* hover */
.nav > ul > li:hover > .dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

/* 👉 세로 정렬 확실히 */
.dropdown li {
    display: block;
    width: 100%;
}

/* 👉 클릭 영역 + 줄 정렬 */
.dropdown a {
    display: block;
    padding: 12px 0;
    width: 100%;
}

/* hover 효과 */
.nav > ul > li:hover {
    background-color: black;
}

.nav > ul > li:hover > a {
    color: white;
}

.dropdown a:hover {
    background-color: #444;
    color: white;
}
.header{
    font-family: fantasy;
}
</style>
</head>

<body>

<div class="header">
    <h1>GM-Web Site</h1>
    <p>회사소개 전문</p>
</div>

<nav class="nav">

                <li><a href="소개.html">소개</a></li>
            </ul>
        </li>

        <li>
            <a href="#">실적</a>
            <ul class="dropdown">
                <li><a href="실적.html">실적</a></li>
            </ul>
        </li>

        <li>
            <a href="#">신청</a>
            <ul class="dropdown">
                <li><a href="메일.html">카톡</a></li>
                <li><a href="메일.html">이메일</a></li>
            </ul>
        </li>
    </ul>
</nav>
